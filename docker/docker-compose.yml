version: "3.9"

services:
  # MQTT broker for CSI packet transport from ESP32 nodes
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"   # MQTT
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # ElderCare ingestion + inference + alerting
  eldercare-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - mosquitto
    ports:
      - "8000:8000"   # FastAPI REST + dashboard backend
    environment:
      - PYTHONUNBUFFERED=1
      - ELDERCARE_MQTT_HOST=mosquitto
      - ELDERCARE_MQTT_PORT=1883
      - ELDERCARE_CONFIG_PATH=configs/zones.yaml
    restart: unless-stopped
