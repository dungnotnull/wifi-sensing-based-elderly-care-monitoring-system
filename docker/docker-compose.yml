version: "3.9"

services:
  # MQTT broker for CSI packet transport from ESP32 nodes
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"   # MQTT
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # UDP-to-MQTT bridge for RuView ESP32-S3 firmware (ADR-018 binary → JSON/MQTT)
  udp-mqtt-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - mosquitto
    ports:
      - "5005:5005/udp"   # CSI frames from ESP32 nodes
    command: python -m ingestion.udp_mqtt_bridge --config configs/zones.yaml --mqtt-broker mosquitto
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ElderCare ingestion + inference + alerting
  eldercare-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - mosquitto
    ports:
      - "8000:8000"   # FastAPI REST + dashboard backend
    environment:
      - PYTHONUNBUFFERED=1
      - ELDERCARE_MQTT_HOST=mosquitto
      - ELDERCARE_MQTT_PORT=1883
      - ELDERCARE_CONFIG_PATH=configs/zones.yaml
    restart: unless-stopped
